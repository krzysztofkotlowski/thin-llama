services:
  thin-llama:
    platform: ${THIN_LLAMA_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: Dockerfile
    image: thin-llama:latest
    ports:
      - "8080:8080"
    volumes:
      - thin-llama-models:/models
      - thin-llama-state:/state
    restart: unless-stopped

volumes:
  thin-llama-models:
  thin-llama-state:
