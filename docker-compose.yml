services:
  thin-llama:
    platform: ${THIN_LLAMA_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: Dockerfile
    image: thin-llama:latest
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
      - ./state:/state
      - ${THIN_LLAMA_CONFIG:-./config.example.json}:/config/config.json:ro
    restart: unless-stopped
